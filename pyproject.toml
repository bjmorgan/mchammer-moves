[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mchammer-moves"
version = "0.1.0"
description = "Custom Monte Carlo moves for icet/mchammer."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Benjamin Morgan" }]
dependencies = [
    "icet>=2.0",
    "numpy",
    "ase",
]

[project.optional-dependencies]
# `mchammer-pt` is an optional integration dependency: importing
# `mchammer_moves` itself does not require it, but consuming
# `CustomCanonicalEnsemble` through parallel tempering does. The
# integration uses `mchammer-pt`'s native `ensemble_cls=` /
# `ensemble_kwargs=` API (mchammer-pt v0.2+); the public
# `mchammer_pt.testing.assert_boltzmann_sampling` utility is used by
# the combined-kernel detailed-balance test in this package.
pt = ["mchammer-pt"]
test = ["pytest>=7", "scipy", "mchammer-pt"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
